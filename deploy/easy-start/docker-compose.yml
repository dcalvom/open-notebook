version: "3.9"

services:
  surrealdb:
    image: surrealdb/surrealdb:v2
    command: start --log info --user ${SURREAL_USER} --pass ${SURREAL_PASSWORD} rocksdb:/mydata/mydatabase.db
    ports:
      - "${HOST_DB_PORT:-8000}:8000"
    volumes:
      - ${SURREAL_DATA_PATH:-./surreal_data}:/mydata
    environment:
      SURREAL_EXPERIMENTAL_GRAPHQL: "true"
    restart: unless-stopped

  open_notebook:
    image: ${OPEN_NOTEBOOK_IMAGE:-lfnovo/open_notebook}:${OPEN_NOTEBOOK_IMAGE_TAG:-v1-latest}
    ports:
      - "${HOST_UI_PORT:-8502}:8502"
      - "${HOST_API_PORT:-5055}:5055"
    environment:
      OPEN_NOTEBOOK_ENCRYPTION_KEY: ${OPEN_NOTEBOOK_ENCRYPTION_KEY}
      OPEN_NOTEBOOK_PASSWORD: ${OPEN_NOTEBOOK_PASSWORD}
      API_URL: ${API_PUBLIC_URL}
      SURREAL_URL: ws://surrealdb:8000/rpc
      SURREAL_USER: ${SURREAL_USER}
      SURREAL_PASSWORD: ${SURREAL_PASSWORD}
      SURREAL_NAMESPACE: ${SURREAL_NAMESPACE}
      SURREAL_DATABASE: ${SURREAL_DATABASE}
      OPEN_NOTEBOOK_DATA_DIR: /app/data
    volumes:
      - ${NOTEBOOK_DATA_PATH:-./notebook_data}:/app/data
    depends_on:
      - surrealdb
    restart: unless-stopped
